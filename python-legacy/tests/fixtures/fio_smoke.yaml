version: 1
engine: fio
output_dir: ./results-smoke

clients:
  - host: localhost
    elbencho_path: ${CONFIG_DIR}/fake_fio.sh

targets:
  - name: local-tmp
    kind: posix
    mount_path: /tmp
    dataset_subdir: elbencho-harness-fio-smoke
    cleanup: false

workloads:
  - name: 1m-seq-read
    pattern: seq
    block_size: 1MiB
    rw_mix_pct_read: 100
    threads_per_client: 4
    io_depth: 4
    file_size: 256MiB
    file_count: 4
    direct_io: false

runs:
  - target: local-tmp
    workload: 1m-seq-read
