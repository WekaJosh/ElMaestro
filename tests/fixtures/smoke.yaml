version: 1
output_dir: ./results-smoke

clients:
  - host: localhost
    elbencho_path: /Users/josh.h/Documents/code/benchmark-wrapper/tests/fixtures/fake_elbencho.sh

targets:
  - name: local-tmp
    kind: posix
    mount_path: /tmp
    dataset_subdir: elbencho-harness-smoke
    cleanup: false

workloads:
  - name: 1m-seq-read
    pattern: seq
    block_size: 1MiB
    rw_mix_pct_read: 100
    threads_per_client: 4
    io_depth: 4
    file_size: 256MiB
    file_count: 4
    direct_io: false
    drop_caches_before: false

runs:
  - target: local-tmp
    workload: 1m-seq-read
