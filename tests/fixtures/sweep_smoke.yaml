version: 1
output_dir: ./results-smoke

clients:
  - host: localhost
    elbencho_path: ${CONFIG_DIR}/fake_elbencho.sh

targets:
  - name: local-tmp
    kind: posix
    mount_path: /tmp
    dataset_subdir: elbencho-harness-smoke
    cleanup: false

workloads:
  - name: base
    pattern: seq
    block_size: 1MiB
    rw_mix_pct_read: 100
    threads_per_client: 4
    io_depth: 4
    file_size: 256MiB
    file_count: 4
    direct_io: false

sweeps:
  - name: bs-and-threads
    base: base
    target: local-tmp
    order: ladder
    axes:
      block_size: [64KiB, 1MiB]
      threads_per_client: [2, 4]
