# Smallest useful elbencho-harness run: 1 MiB sequential read against a local mount.
#
# v0.1 runs a write phase first to populate the dataset, then the read phase. The
# read phase numbers are the headline. Adjust mount_path / dataset_subdir before
# running.
version: 1
output_dir: ./results

clients:
  - host: localhost
    elbencho_path: elbencho

targets:
  - name: local-tmp
    kind: posix
    mount_path: /tmp
    dataset_subdir: elbencho-harness-bench
    cleanup: false

workloads:
  - name: 1m-seq-read
    pattern: seq
    block_size: 1MiB
    rw_mix_pct_read: 100
    threads_per_client: 4
    io_depth: 4
    file_size: 256MiB
    file_count: 4
    direct_io: false        # /tmp is usually tmpfs; direct IO not supported there
    drop_caches_before: false

runs:
  - target: local-tmp
    workload: 1m-seq-read
